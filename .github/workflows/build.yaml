name: Aiven Cost
on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  push:
    branches: [main]
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  checks:
    strategy:
      matrix:
        mise-task:
          - check:deadcode
          - check:gosec
          - check:govet
          - check:govulncheck
          - check:staticcheck
          - ci:fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # ratchet:jdx/mise-action@v4
      - run: mise run ${{ matrix.mise-task }}
  # Used by GitHub to determine if all checks/builds have passed
  branch-protection-checkpoint:
    runs-on: ubuntu-latest
    needs: [checks]
    if: ${{ always() }}
    steps:
      - if: ${{ needs.checks.result != 'success' }}
        run: exit 1
      - run: echo "All checks and builds passed."
